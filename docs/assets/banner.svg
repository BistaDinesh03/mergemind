<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <rect width="1280" height="640" fill="#09090b" />
  
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#27272a" stroke-width="0.4" opacity="0.25" />
    </pattern>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.04" />
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="70%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0" />
      <stop offset="30%" stop-color="#8b5cf6" stop-opacity="0.6" />
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="50" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="subtleShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <rect width="1280" height="640" fill="url(#grid)" />
  
  <!-- Large soft purple glow behind dashboard -->
  <ellipse cx="900" cy="320" rx="300" ry="220" fill="url(#purpleGlow)" filter="url(#glow)" opacity="0.5" />
  
  <!-- Tiny floating particles along the connection line -->
  <circle cx="380" cy="310" r="1.5" fill="#8b5cf6" opacity="0.4" />
  <circle cx="480" cy="295" r="1" fill="#8b5cf6" opacity="0.3" />
  <circle cx="560" cy="315" r="1.8" fill="#8b5cf6" opacity="0.35" />
  <circle cx="640" cy="305" r="1.2" fill="#8b5cf6" opacity="0.25" />
  <circle cx="440" cy="325" r="1" fill="#a78bfa" opacity="0.3" />
  <circle cx="600" cy="298" r="1.3" fill="#8b5cf6" opacity="0.3" />
  
  <!-- Glowing connection line -->
  <path d="M 200 300 Q 400 280 680 300" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" filter="url(#softGlow)" />
  <path d="M 200 300 Q 400 280 680 300" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3" />
  
  <!-- LEFT SECTION — Brand -->
  
  <!-- GitHub icon (tiny, beside logo) -->
  <circle cx="100" cy="260" r="18" fill="#18181b" stroke="#27272a" stroke-width="0.8" />
  <path d="M92 264C92 260 95 257 100 257C104 257 108 260 108 264C108 268 104 271 100 271Z" fill="none" stroke="#a1a1aa" stroke-width="1.2" />
  <line x1="100" y1="267" x2="100" y2="273" stroke="#a1a1aa" stroke-width="1.2" stroke-linecap="round" />
  
  <!-- MergeMind Logo — 35% larger -->
  <rect x="134" y="240" width="72" height="72" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" filter="url(#subtleShadow)" />
  <line x1="170" y1="282" x2="170" y2="294" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" />
  <line x1="154" y1="282" x2="186" y2="282" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" />
  <circle cx="170" cy="282" r="3.5" fill="#a78bfa" />
  <path d="M158 270C158 262 164 256 170 256C176 256 182 262 182 270V276C182 276 176 272 170 272C164 272 158 276 158 276V270Z" fill="none" stroke="#8b5cf6" stroke-width="2.2" stroke-linecap="round" />
  <path d="M170 263L171.5 266L174 267.5L171.5 269L170 271.5L168.5 269L166 267.5L168.5 266Z" fill="#a78bfa" />
  
  <!-- Brand Name -->
  <text x="222" y="272" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5">MergeMind</text>
  
  <!-- Tagline -->
  <text x="134" y="348" fill="#a1a1aa" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="400">GitHub issues. Scored by AI. Ready to work on.</text>
  
  <!-- RIGHT SECTION — Real Dashboard -->
  
  <!-- Main dashboard card with glass effect -->
  <rect x="680" y="130" width="520" height="400" rx="18" fill="#18181b" fill-opacity="0.9" stroke="#27272a" stroke-width="0.8" filter="url(#subtleShadow)" />
  
  <!-- Dashboard top bar -->
  <rect x="680" y="130" width="520" height="40" rx="18" fill="#18181b" />
  <rect x="680" y="150" width="520" height="20" fill="#18181b" />
  <circle cx="700" cy="150" r="4" fill="#ef4444" opacity="0.5" />
  <circle cx="714" cy="150" r="4" fill="#eab308" opacity="0.5" />
  <circle cx="728" cy="150" r="4" fill="#22c55e" opacity="0.5" />
  
  <!-- Dashboard content area -->
  
  <!-- Repo header -->
  <text x="706" y="194" fill="#a1a1aa" font-family="-apple-system, sans-serif" font-size="13" font-weight="500">fastapi / fastapi</text>
  
  <!-- Issue title -->
  <text x="706" y="218" fill="#ffffff" font-family="-apple-system, sans-serif" font-size="15" font-weight="600">Add type hints to dependencies</text>
  
  <!-- Labels row -->
  <rect x="706" y="232" width="52" height="22" rx="11" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3" />
  <text x="718" y="247" fill="#22c55e" font-family="-apple-system, sans-serif" font-size="10" font-weight="500" text-anchor="middle">Easy</text>
  
  <rect x="766" y="232" width="56" height="22" rx="11" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="0.5" stroke-opacity="0.3" />
  <text x="780" y="247" fill="#a78bfa" font-family="-apple-system, sans-serif" font-size="10" font-weight="500" text-anchor="middle">1-2 hours</text>
  
  <rect x="830" y="232" width="52" height="22" rx="11" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.3" />
  <text x="842" y="247" fill="#60a5fa" font-family="-apple-system, sans-serif" font-size="10" font-weight="500" text-anchor="middle">88%</text>
  
  <!-- Stats row -->
  <rect x="706" y="272" width="104" height="64" rx="12" fill="#18181b" stroke="#27272a" stroke-width="0.5" />
  <text x="758" y="296" fill="#a1a1aa" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">Merge</text>
  <text x="758" y="320" fill="#ffffff" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" text-anchor="middle">88%</text>
  
  <rect x="820" y="272" width="104" height="64" rx="12" fill="#18181b" stroke="#27272a" stroke-width="0.5" />
  <text x="872" y="296" fill="#a1a1aa" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">Health</text>
  <text x="872" y="320" fill="#ffffff" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" text-anchor="middle">90</text>
  
  <rect x="934" y="272" width="104" height="64" rx="12" fill="#18181b" stroke="#27272a" stroke-width="0.5" />
  <text x="986" y="296" fill="#a1a1aa" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">Beginner</text>
  <text x="986" y="320" fill="#22c55e" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" text-anchor="middle">High</text>
  
  <!-- AI Score Circle — Focal Point -->
  <circle cx="1110" cy="256" r="42" fill="#18181b" stroke="#27272a" stroke-width="0.8" filter="url(#subtleShadow)" />
  <circle cx="1110" cy="256" r="36" fill="none" stroke="url(#scoreGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="200" stroke-dashoffset="16" />
  <text x="1110" y="252" fill="#ffffff" font-family="-apple-system, sans-serif" font-size="24" font-weight="700" text-anchor="middle">92</text>
  <text x="1110" y="268" fill="#a78bfa" font-family="-apple-system, sans-serif" font-size="9" font-weight="500" text-anchor="middle">Score</text>
  
  <!-- Verdict badge below score -->
  <rect x="1054" y="308" width="112" height="22" rx="11" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3" />
  <text x="1110" y="323" fill="#22c55e" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Highly Recommended</text>
  
  <!-- Bottom caption (tiny) -->
  <text x="1100" y="555" fill="#52525b" font-family="-apple-system, sans-serif" font-size="11" text-anchor="end">AI analyzes repositories and recommends the best issue to contribute to.</text>
  
  <!-- Tiny GitHub icon near dashboard -->
  <circle cx="680" cy="362" r="10" fill="#18181b" stroke="#27272a" stroke-width="0.5" />
  <path d="M676 365C676 363 678 361 680 361C682 361 684 363 684 365C684 367 682 369 680 369Z" fill="none" stroke="#52525b" stroke-width="0.8" />
  <line x1="680" y1="367" x2="680" y2="370" stroke="#52525b" stroke-width="0.8" stroke-linecap="round" />
  
</svg>