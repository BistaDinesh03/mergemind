services:
  ollama:
    image: ollama/ollama:0.5.4
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mergemind

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./mergemind.db
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - GITHUB_TOKEN=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
      - GITHUB_CLIENT_ID=Ov23liarpCveA9VTsC90
      - GITHUB_CLIENT_SECRET=0f848961013dbd9091c26b011570b5c20f417e9c
      - SECRET_KEY=dev-secret
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - ollama
    networks:
      - mergemind

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - mergemind

volumes:
  ollama_data:

networks:
  mergemind:
    driver: bridge