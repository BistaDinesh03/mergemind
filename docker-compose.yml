services:
  ollama:
    image: ollama/ollama:0.5.4
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mergemind
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./mergemind.db
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - GITHUB_TOKEN=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
      - GITHUB_CLIENT_ID=Ov23liarpCveA9VTsC90
      - GITHUB_CLIENT_SECRET=0f848961013dbd9091c26b011570b5c20f417e9c
      - SECRET_KEY=dev-secret
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - mergemind

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret
      - GITHUB_CLIENT_ID=Ov23liarpCveA9VTsC90
      - GITHUB_CLIENT_SECRET=0f848961013dbd9091c26b011570b5c20f417e9c
    depends_on:
      - backend
    networks:
      - mergemind

volumes:
  ollama_data:

networks:
  mergemind:
    driver: bridge